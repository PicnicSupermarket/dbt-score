name: ci

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-lock:
    runs-on: ubuntu-slim
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]'
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: Refresh uv.lock
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "App token unavailable, refusing to refresh uv.lock as a different identity" >&2
            exit 1
          fi

          uv lock
          if git diff --quiet -- uv.lock; then
            exit 0
          fi

          SHA=$(gh api "/repos/$REPO/contents/uv.lock?ref=$BRANCH" --jq .sha)

          gh api --method PUT "/repos/$REPO/contents/uv.lock" \
            -f message="chore: refresh uv.lock" \
            -f content="$(base64 -w0 uv.lock)" \
            -f branch="$BRANCH" \
            -f sha="$SHA"

  build:
    needs: refresh-lock
    if: |
      always() &&
      (needs.refresh-lock.result == 'success' || needs.refresh-lock.result == 'skipped')
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      # NOTE: This matrix duplicates the supported Python/dbt-core combinations
      # defined in tox.ini's `env_list`. If you add or drop a Python or dbt
      # version, update BOTH files. The valid combinations follow dbt's Python
      # compatibility matrix:
      # https://docs.getdbt.com/faqs/Core/install-python-compatibility
      #   dbt 1.5/1.6:   Python 3.10-3.11
      #   dbt 1.7/1.19:  Python 3.10-3.12
      #   dbt 1.11:      Python 3.10-3.13
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        dbt-core: ["15", "16", "17", "110", "111"]
        exclude:
          - { python: "3.12", dbt-core: "15" }
          - { python: "3.12", dbt-core: "16" }
          - { python: "3.13", dbt-core: "15" }
          - { python: "3.13", dbt-core: "16" }
          - { python: "3.13", dbt-core: "17" }
          - { python: "3.13", dbt-core: "110" }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository:
            ${{ github.event.pull_request.head.repo.full_name ||
            github.repository }}
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          uv sync --locked --only-dev
      - name: Run Tox
        run: |
          PYTHON_VERSION=$(echo "${{ matrix.python }}" | sed 's/\.//')
          uv run tox -e py${PYTHON_VERSION}-dbt${{ matrix.dbt-core }}

  lint:
    needs: refresh-lock
    if: |
      always() &&
      (needs.refresh-lock.result == 'success' || needs.refresh-lock.result == 'skipped')
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          uv sync --locked --only-dev
      - name: Run Prettier
        run: npx --yes prettier@3.1.0 --check "**/*.{json,yaml,yml,md}"
      - name: Run Tox lint
        run: |
          uv run tox -e lint
